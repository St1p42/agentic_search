<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentic Search Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-alt: #f8fafc;
      --border: #d9e1ec;
      --border-strong: #c6d2e3;
      --text: #132033;
      --muted: #5f6f86;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --accent-soft: #e8f0ff;
      --success: #127a51;
      --error: #b42318;
      --shadow: 0 12px 32px rgba(16, 24, 40, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #eef4ff 0, transparent 34%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }

    .hero {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      max-width: 760px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 18px;
    }

    form {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 280px;
      padding: 14px 16px;
      font-size: 15px;
      color: var(--text);
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    input[type="text"]:focus {
      background: #fff;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    button {
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(180deg, #3b82f6 0%, var(--accent) 100%);
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    button:hover {
      background: linear-gradient(180deg, #3676df 0%, var(--accent-dark) 100%);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.26);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      padding: 14px 16px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-weight: 600;
    }

    .status::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.12);
      flex: 0 0 auto;
    }

    .stages {
      margin: 0;
      padding-left: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .stages li {
      position: relative;
      padding: 12px 14px 12px 44px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      line-height: 1.4;
    }

    .stages li::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 15px;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.12);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 700;
    }

    .error {
      padding: 14px 16px;
      border: 1px solid rgba(180, 35, 24, 0.18);
      border-radius: 14px;
      background: #fff2f1;
      color: var(--error);
      white-space: pre-wrap;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
    }

    th, td {
      border-bottom: 1px solid var(--border);
      padding: 12px 14px;
      vertical-align: top;
      text-align: left;
      min-width: 150px;
    }

    th {
      position: sticky;
      top: 0;
      background: #f3f7fd;
      color: #23344d;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    td:first-child {
      min-width: 220px;
      font-weight: 700;
    }

    tr:nth-child(even) td {
      background: #fbfcfe;
    }

    .sources a {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
      text-decoration: none;
      word-break: break-word;
    }

    .sources a:hover {
      text-decoration: underline;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .page {
        padding: 24px 16px 40px;
      }

      h1 {
        font-size: 28px;
      }

      form {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>Agentic Search Demo</h1>
      <p class="subtitle">
        Run the active pipeline end to end, watch stage progress live over SSE, and inspect the final structured table with linked sources.
      </p>
    </div>

    <div class="card">
      <form id="search-form">
        <input id="query" type="text" name="query" value="best phone models in 2026" />
        <button type="submit">Run Search</button>
      </form>
    </div>

    <div class="card">
      <div class="section-title">Status</div>
      <div class="status" id="status">Idle</div>
    </div>

    <div class="card">
      <div class="section-title">Pipeline Timeline</div>
      <ol class="stages" id="stages"></ol>
    </div>

    <div class="card" id="result-card">
      <div id="result"></div>
    </div>
  </div>
  <script>
    const form = document.getElementById("search-form");
    const queryInput = document.getElementById("query");
    const statusEl = document.getElementById("status");
    const stagesEl = document.getElementById("stages");
    const resultEl = document.getElementById("result");
    let currentSource = null;

    function resetUi(query) {
      statusEl.textContent = `Running: ${query}`;
      stagesEl.innerHTML = "";
      resultEl.innerHTML = "";
    }

    function addStage(text) {
      const item = document.createElement("li");
      item.textContent = text;
      stagesEl.appendChild(item);
    }

    function renderValue(fieldValue) {
      if (!fieldValue || fieldValue.value === null || fieldValue.value === undefined) {
        return '<span class="muted">-</span>';
      }
      if (Array.isArray(fieldValue.value)) {
        return fieldValue.value.join("<br>");
      }
      return String(fieldValue.value);
    }

    function renderSources(row) {
      if (!row.source_urls || row.source_urls.length === 0) {
        return '<span class="muted">-</span>';
      }
      return `<div class="sources">${row.source_urls.map((url) => `<a href="${url}" target="_blank" rel="noreferrer">${url}</a>`).join("")}</div>`;
    }

    function renderTable(data) {
      const columns = data.inferred_schema || [];
      const rows = data.final_top_10_rows || [];
      const header = ["name", ...columns.filter((col) => col !== "name"), "sources"];
      const thead = `<thead><tr>${header.map((col) => `<th>${col}</th>`).join("")}</tr></thead>`;
      const tbody = rows.map((row) => {
        const cells = [];
        cells.push(`<td>${row.name ?? '<span class="muted">-</span>'}</td>`);
        columns.filter((col) => col !== "name").forEach((col) => {
          cells.push(`<td>${renderValue(row.fields?.[col])}</td>`);
        });
        cells.push(`<td>${renderSources(row)}</td>`);
        return `<tr>${cells.join("")}</tr>`;
      }).join("");
      resultEl.innerHTML = `
        <h2>Results</h2>
        <div class="table-wrap">
          <table>
            ${thead}
            <tbody>${tbody}</tbody>
          </table>
        </div>
      `;
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const query = queryInput.value.trim();
      if (!query) {
        statusEl.textContent = "Enter a query.";
        return;
      }

      if (currentSource) {
        currentSource.close();
      }

      resetUi(query);
      const streamUrl = `/api/v1/search/stream?query=${encodeURIComponent(query)}`;
      currentSource = new EventSource(streamUrl);

      currentSource.addEventListener("run_started", (event) => {
        const payload = JSON.parse(event.data);
        addStage(payload.payload.message);
      });

      currentSource.addEventListener("stage_started", (event) => {
        const payload = JSON.parse(event.data);
        addStage(`${payload.payload.stage}: ${payload.payload.message}`);
      });

      currentSource.addEventListener("stage_completed", (event) => {
        const payload = JSON.parse(event.data);
        addStage(`${payload.payload.stage}: ${payload.payload.message}`);
      });

      currentSource.addEventListener("run_completed", (event) => {
        const payload = JSON.parse(event.data);
        statusEl.textContent = "Completed";
        renderTable(payload.payload.data);
        currentSource.close();
      });

      currentSource.addEventListener("run_failed", (event) => {
        const payload = JSON.parse(event.data);
        statusEl.textContent = "Failed";
        resultEl.innerHTML = `<div class="error">${payload.payload.error?.message || "Unknown error"}</div>`;
        currentSource.close();
      });

      currentSource.onerror = () => {
        statusEl.textContent = "Stream interrupted";
      };
    });
  </script>
</body>
</html>
